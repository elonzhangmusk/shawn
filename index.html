<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>张航宁 - 科幻风格个人展示网站</title>
    <meta name="description" content="张航宁的个人展示网站，展示全国一等奖智能车项目、科研经历和专业技能。科幻风格设计，包含3D效果和博客系统。" />
    <meta name="keywords" content="张航宁, 杭州电子科技大学, 智能车竞赛, 全国一等奖, 自动化, 个人网站, 科幻风格" />
    <meta name="author" content="张航宁" />
    <meta property="og:title" content="张航宁 - 科幻风格个人展示网站" />
    <meta property="og:description" content="展示全国一等奖智能车项目、科研经历和专业技能" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zhanghangning.github.io/scifi-portfolio" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background: #0a0a1a;
        color: #ffffff;
        font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      }
      
      #root {
        min-height: 100vh;
        position: relative;
      }
      
      /* 加载动画 */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a1a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(0, 212, 255, 0.3);
        border-top: 4px solid #00d4ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      
      .loading-text {
        color: #00d4ff;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* 扫描线效果 */
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(to right, transparent, #00d4ff, transparent);
        z-index: 9998;
        pointer-events: none;
        animation: scanline 10s linear infinite;
      }
      
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
    </style>
  </head>
  <body>
    <div class="loading-screen" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">系统初始化中...</div>
    </div>
    <div class="scanline"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
